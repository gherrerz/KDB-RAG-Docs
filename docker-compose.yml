services:
  api:
    build: .
    container_name: kdb-rag-docs-api
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    environment:
      - PYTHONUNBUFFERED=1
      - USE_CHROMA=true
      - CHROMA_PERSIST_DIR=storage/chromadb
      - CHROMA_COLLECTION=coderag_chunks
      - USE_RQ=true
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
    depends_on:
      - redis
      - neo4j

  worker:
    build: .
    container_name: kdb-rag-docs-worker
    command: rq worker --url redis://redis:6379/0 ingestion
    volumes:
      - ./:/app
    environment:
      - PYTHONUNBUFFERED=1
      - USE_CHROMA=true
      - CHROMA_PERSIST_DIR=storage/chromadb
      - CHROMA_COLLECTION=coderag_chunks
      - USE_RQ=true
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: kdb-rag-docs-redis
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5
    container_name: kdb-rag-docs-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
