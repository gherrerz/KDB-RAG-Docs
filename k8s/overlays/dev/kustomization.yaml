apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - redis.yaml
  - neo4j.yaml
patches:
  - target:
      kind: ConfigMap
      name: coderag-app-config
    patch: |-
      - op: replace
        path: /data/NEO4J_URI
        value: bolt://neo4j:7687
      - op: replace
        path: /data/REDIS_URL
        value: redis://redis:6379/0
  - target:
      kind: Deployment
      name: coderag-api
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
  - target:
      kind: Deployment
      name: coderag-worker
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
images:
  - name: kdb-rag-docs
    newName: kdb-rag-docs
    newTag: latest
