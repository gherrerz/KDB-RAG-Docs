apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
  namespace: coderag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      enableServiceLinks: false
      securityContext:
        runAsUser: 7474
        runAsGroup: 7474
        fsGroup: 7474
      containers:
        - name: neo4j
          image: neo4j:5
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          env:
            - name: NEO4J_AUTH
              value: neo4j/password
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
      volumes:
        - name: neo4j-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: coderag
spec:
  selector:
    app: neo4j
  ports:
    - name: http
      protocol: TCP
      port: 7474
      targetPort: http
    - name: bolt
      protocol: TCP
      port: 7687
      targetPort: bolt
  type: ClusterIP
