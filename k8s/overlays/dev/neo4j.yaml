apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
  namespace: coderag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      enableServiceLinks: false
      securityContext:
        runAsUser: 7474
        runAsGroup: 7474
        fsGroup: 7474
      containers:
        - name: neo4j
          image: neo4j:5.24.0
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          env:
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: coderag-app-secrets
                  key: NEO4J_PASSWORD
            - name: NEO4J_AUTH
              value: neo4j/$(NEO4J_PASSWORD)
          startupProbe:
            tcpSocket:
              port: bolt
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12
          readinessProbe:
            tcpSocket:
              port: bolt
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: bolt
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2
              memory: 3Gi
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
      volumes:
        - name: neo4j-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: coderag
spec:
  selector:
    app: neo4j
  ports:
    - name: http
      protocol: TCP
      port: 7474
      targetPort: http
    - name: bolt
      protocol: TCP
      port: 7687
      targetPort: bolt
  type: ClusterIP
