apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: coderag-api-ingress
  namespace: coderag
spec:
  podSelector:
    matchLabels:
      app: coderag-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: coderag-worker-deny-ingress
  namespace: coderag
spec:
  podSelector:
    matchLabels:
      app: coderag-worker
  policyTypes:
    - Ingress
  ingress: []
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: coderag-redis-ingress
  namespace: coderag
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - coderag-api
                  - coderag-worker
      ports:
        - protocol: TCP
          port: 6379
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: coderag-neo4j-ingress
  namespace: coderag
spec:
  podSelector:
    matchLabels:
      app: neo4j
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - coderag-api
                  - coderag-worker
      ports:
        - protocol: TCP
          port: 7687
