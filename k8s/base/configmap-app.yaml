apiVersion: v1
kind: ConfigMap
metadata:
  name: coderag-app-config
  namespace: coderag
data:
  PYTHONUNBUFFERED: "1"
  USE_CHROMA: "true"
  CHROMA_PERSIST_DIR: /data/chromadb
  CHROMA_COLLECTION: coderag_chunks
  USE_NEO4J: "true"
  NEO4J_URI: bolt://neo4j.default.svc.cluster.local:7687
  NEO4J_USER: neo4j
  USE_RQ: "true"
  REDIS_URL: redis://redis.default.svc.cluster.local:6379/0
  RQ_INGEST_JOB_TIMEOUT_SEC: "900"
  DATA_DIR: /data
  WORKSPACE_DIR: /data/workspace
  LLM_PROVIDER: openai
  OPENAI_BASE_URL: https://api.openai.com/v1
  OPENAI_ANSWER_MODEL: gpt-4.1-mini
  OPENAI_EMBEDDING_MODEL: text-embedding-3-small
