apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: coderag-api
  namespace: coderag
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - coderag.local
      secretName: coderag-api-tls
  rules:
    - host: coderag.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: coderag-api
                port:
                  number: 8000
