apiVersion: apps/v1
kind: Deployment
metadata:
  name: coderag-worker
  namespace: coderag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coderag-worker
  template:
    metadata:
      labels:
        app: coderag-worker
    spec:
      containers:
        - name: worker
          image: kdb-rag-docs:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - coderag.jobs.worker
          envFrom:
            - configMapRef:
                name: coderag-app-config
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: coderag-app-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: coderag-app-secrets
                  key: GEMINI_API_KEY
                  optional: true
            - name: VERTEX_SERVICE_ACCOUNT_JSON_B64
              valueFrom:
                secretKeyRef:
                  name: coderag-app-secrets
                  key: VERTEX_SERVICE_ACCOUNT_JSON_B64
                  optional: true
            - name: VERTEX_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: coderag-app-secrets
                  key: VERTEX_PROJECT_ID
                  optional: true
            - name: VERTEX_LABEL_SERVICE
              value: webspec-coipo
            - name: VERTEX_LABEL_SERVICE_ACCOUNT
              value: qa-anthos
            - name: VERTEX_LABEL_MODEL_NAME
              value: gemini-2.5-flash
            - name: VERTEX_LABEL_USE_CASE_ID
              value: tbd
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: coderag-app-secrets
                  key: NEO4J_PASSWORD
          volumeMounts:
            - name: app-data
              mountPath: /storage
          startupProbe:
            exec:
              command:
                - python
                - -c
                - import os; from redis import Redis; Redis.from_url(os.getenv('REDIS_URL', 'redis://redis:6379/0')).ping()
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - import os; from redis import Redis; Redis.from_url(os.getenv('REDIS_URL', 'redis://redis:6379/0')).ping()
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - import os; from redis import Redis; Redis.from_url(os.getenv('REDIS_URL', 'redis://redis:6379/0')).ping()
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 4
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: coderag-data-pvc
